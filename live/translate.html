<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#EAF1C5">
    <title>Translate | Sign to Text</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.png">
    <link rel="stylesheet" href="assets/styles/translate.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
</head>

<body>
    <div class="navbar">
        <img src="assets/img/arrow-back.png" id="back-btn" class="nav-btn" alt="back">
        <img src="assets/img/switch-cam.png" id="cam-switch-btn" class="nav-btn" alt="switch-camera">
    </div>
    <canvas id="canvas" class="webcam-view"></canvas>
    <div class="transcript-wrapper">
        <div class="transcript-tittle-bar-wrapper">
            <img src="assets/img/google-translate-icon.png" id="gtranslate-btn" alt="google translate">
            <img src="assets/img/transcript-heading.png" id="transcript-heading" alt="Transcript!">
            <img src="assets/img/transcript-expand-icon.png" id="expand-transcript-btn" alt="">
        </div>
        <div id="textarea"></div>
        <img src="assets/img/transcript-settings-icon.png" id="transcript-settings-btn" alt="transcript-settings">
    </div>
    <div class="quick-controls">
        <img src="assets/img/speaker-icon.png" id="gtts-btn" class="quick-btn" alt="speak">
        <img src="assets/img/camera-icon.png" id="camera-btn" class="quick-btn" alt="camera">
        <img src="assets/img/upload-icon.png" id="upload-btn" class="quick-btn" alt="upload photo">
    </div>
    <img src="assets/img/bottom-sheet.png" id="bottom-sheet" alt="bottom-sheet">
    <script>
        // meta js for normal stuff
    </script>
    <script>
        //meta(not so imp) functions by vkc!
        function hilightLastLine(elementId) {
            let textarea = document.querySelector(`#${elementId}`);
            textArea.children[textArea.children.length - 1].id = 'last-line';

        }

        //start on btn click
        document.getElementById('camera-btn').addEventListener("click", init);
        // tensorflow.js magic
        let model, webcam, ctx, labelContainer, maxPredictions;
        async function init() {
            const modelURL = "https://vivekkushalch.github.io/Indian-Sign-Language-Recognition-System/v2/model.json";
            const metadataURL = "https://vivekkushalch.github.io/Indian-Sign-Language-Recognition-System/v2/metadata.json";

            // load the model and metadata
            // Refer to tmImage.loadFromFiles() in the API to support files from a file picker
            // Note: the pose library adds a tmPose object to your window (window.tmPose)
            model = await tmPose.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Convenience function to setup a webcam
            const size = 200;
            const flip = true; // whether to flip the webcam
            webcam = new tmPose.Webcam(size, size, flip); // width, height, flip
            await webcam.setup(); // request access to the webcam
            await webcam.play();
            window.requestAnimationFrame(loop);

            // append/get elements to the DOM
            const canvas = document.getElementById("canvas");
            canvas.width = size;
            canvas.height = size;
            ctx = canvas.getContext("2d");
            labelContainer = document.getElementById("textarea");
            for (let i = 0; i < maxPredictions; i++) { // and class labels
                let para = document.createElement("p");
                para.className = "line";
                labelContainer.appendChild(para);
            }
        }

        async function loop(timestamp) {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            // Prediction #1: run input through posenet
            // estimatePose can take in an image, video or canvas html element
            const {
                pose,
                posenetOutput
            } = await model.estimatePose(webcam.canvas);
            // Prediction 2: run input through teachable machine classification model
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }

            // finally draw the poses
            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                // draw the keypoints and skeleton
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }
    </script>
</body>

</html>
